name: promote

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - prod
      image_tag:
        description: "Image tag to promote (usually a commit SHA)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target file
        id: target
        run: echo "values_file=deploy/chart/values-${{ inputs.target_env }}.yaml" >> "$GITHUB_OUTPUT"

      - name: Update image tag
        uses: mikefarah/yq@v4.44.5
        with:
          cmd: yq -i '.image.tag = "${{ inputs.image_tag }}"' ${{ steps.target.outputs.values_file }}

      - name: Commit and push promotion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.target.outputs.values_file }}"
          git commit -m "chore(release): promote ${{ inputs.target_env }} to ${{ inputs.image_tag }}"
          git push
